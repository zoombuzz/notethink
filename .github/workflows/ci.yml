name: CI

on:
  push:
    branches: [main, bootstrap]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install extension dependencies
        run: cd client/extension && pnpm install --frozen-lockfile

      - name: Install webview dependencies
        run: cd client/webview && pnpm install --frozen-lockfile

      - name: Install notethink-views dependencies
        run: cd client/webview/src/notethink-views && pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Compile extension
        run: pnpm run build

      - name: Build notethink-views
        run: cd client/webview/src/notethink-views && pnpm run rollup

  test-extension:
    name: Extension Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install extension dependencies
        run: cd client/extension && pnpm install --frozen-lockfile

      - name: Compile extension
        run: pnpm run build

      - name: Run extension tests
        run: xvfb-run -a pnpm run chrome -- --headless
        env:
          DISPLAY: ':99.0'

  test-components:
    name: Component Library Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install webview dependencies
        run: cd client/webview && pnpm install --frozen-lockfile

      - name: Install notethink-views dependencies
        run: cd client/webview/src/notethink-views && pnpm install --frozen-lockfile

      - name: Run component library tests
        run: cd client/webview/src/notethink-views && pnpm test -- --passWithNoTests

      - name: Run webview tests
        run: cd client/webview && pnpm test -- --passWithNoTests

      - name: Build Storybook
        run: cd client/webview/src/notethink-views && pnpm run build-storybook
