<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteThink E2E Harness</title>
    <style>
        /* Stub VS Code CSS variables so the bridge CSS resolves */
        :root {
            --vscode-editor-background: #1e1e1e;
            --vscode-editor-foreground: #d4d4d4;
            --vscode-panel-border: rgba(128, 128, 128, 0.35);
            --vscode-focusBorder: #007fd4;
            --vscode-errorForeground: #f48771;
            --vscode-font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family);
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="vscode-dark">
    <div id="root"></div>
    <script>
        // Mock VS Code API
        window.__captured_messages = [];
        // back the webview persisted state with sessionStorage so getState/setState survive a
        // page reload - mirrors the real VS Code webview, which restores getState() across reloads.
        // Honour a value an addInitScript already set (test pre-seed), else restore from sessionStorage,
        // else start empty. sessionStorage is per-context, so each isolated test still boots clean.
        function loadPersistedState() {
            try {
                var raw = sessionStorage.getItem('__vsCodeState');
                if (raw) { return JSON.parse(raw); }
            } catch (e) {}
            return { docs: {} };
        }
        window.__vsCodeState = window.__vsCodeState || loadPersistedState();
        window.acquireVsCodeApi = function() {
            return {
                getState: function() { return window.__vsCodeState; },
                setState: function(s) {
                    window.__vsCodeState = s;
                    try { sessionStorage.setItem('__vsCodeState', JSON.stringify(s)); } catch (e) {}
                },
                postMessage: function(msg) { window.__captured_messages.push(msg); },
            };
        };
        // Required shim for webpack commonjs output
        var exports = {};
    </script>
    <script src="/client/webview/dist/index.js"></script>
</body>
</html>
