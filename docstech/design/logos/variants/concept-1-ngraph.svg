    <rect x="62" y="54" width="32" height="148" rx="16"/>
    <rect x="162" y="54" width="32" height="148" rx="16"/>
  </g>
  <line x1="78" y1="70" x2="178" y2="186" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>

  <!-- mint thought-nodes at the diagonal termini -->
  <circle cx="78" cy="70" r="23" fill="#34E0C8"/>
  <circle cx="178" cy="186" r="23" fill="#34E0C8"/>
