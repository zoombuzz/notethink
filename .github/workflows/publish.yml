name: Publish to GitHub Packages

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION"
          if npm view @zoombuzz/notethink@$PACKAGE_VERSION version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        if: steps.check.outputs.published == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.check.outputs.published == 'false'
        run: pnpm install

      - name: Configure package.json for npm publish
        if: steps.check.outputs.published == 'false'
        run: |
          node -e "
            const p = require('./package.json');
            p.name = '@zoombuzz/notethink';
            p.files = [
              'client/extension/dist/',
              '!client/extension/dist/test/',
              '!client/extension/dist/**/*.map',
              'client/webview/dist/',
              '!client/webview/dist/**/*.map',
              'templates/'
            ];
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
